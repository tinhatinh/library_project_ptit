{% extends "base.html" %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md border border-gray-100">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">📚</div>
            <h1 class="text-2xl font-bold text-gray-900">Đăng nhập Thư Viện</h1>
            <p class="text-sm text-gray-400 mt-1">Nhập tài khoản để truy cập hệ thống</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-700 text-sm p-4 rounded-lg mb-6 border border-red-100">
            ⚠️ Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.
        </div>
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="id_username" class="block text-sm font-semibold text-gray-700 mb-1.5">Tên đăng nhập</label>
                <input type="text" name="username" id="id_username" autofocus required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder-gray-300 text-gray-800"
                    placeholder="Nhập tên tài khoản...">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-semibold text-gray-700 mb-1.5">Mật khẩu</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder-gray-300 text-gray-800"
                    placeholder="Nhập mật khẩu...">
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition shadow-md shadow-indigo-600/20 cursor-pointer">
                Đăng nhập
            </button>
            <div class="text-center mt-6 text-sm text-gray-500">
                Chưa có tài khoản? <a href="{% url 'register' %}" class="font-semibold text-indigo-600 hover:text-indigo-500">Đăng ký ngay tại đây</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
